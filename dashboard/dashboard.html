<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everything Vault Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
    --border: #475569; --text: #e2e8f0; --text-dim: #94a3b8;
    --accent: #38bdf8; --green: #4ade80; --amber: #fbbf24;
    --red: #f87171; --purple: #a78bfa; --teal: #2dd4bf;
  }
  html, body { height: 100%; overflow: hidden; }
  @media (max-width: 768px) { html, body { overflow: auto; } #app { height: auto; } .view { overflow: visible; } }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
  #stats-bar.collapsed { display: none !important; }
  @media (max-width: 768px) {
    #app { min-width: unset !important; padding: 8px !important; }
    .kanban-col { min-width: 160px; }
  }
  #app { height: 100%; display: flex; flex-direction: column; box-sizing: border-box; }
  .view { flex: 1; min-height: 0; overflow-y: auto; }
  .surface { background: var(--surface); border: 1px solid var(--border); }
  .surface2 { background: var(--surface2); }
  .badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-weight: 600; text-transform: uppercase; }
  .badge-open { background: #1e40af; color: #93c5fd; }
  .badge-done { background: #166534; color: #86efac; }
  .badge-cancelled { background: #374151; color: #9ca3af; }
  .badge-high { background: #991b1b; color: #fca5a5; }
  .badge-medium { background: #92400e; color: #fcd34d; }
  .badge-low { background: #1e3a5f; color: #7dd3fc; }
  .badge-sensitive { background: #7c2d12; color: #fdba74; }
  .badge-credential { background: #581c87; color: #d8b4fe; }
  .badge-episode { background: #134e4a; color: #5eead4; }
  .badge-created { background: #1e3a5f; color: #7dd3fc; }
  .badge-updated { background: #365314; color: #bef264; }
  .badge-renewal { background: #78350f; color: #fde68a; }
  .badge-due { background: #991b1b; color: #fca5a5; }
  .badge-follow_up { background: #4c1d95; color: #c4b5fd; }
  .tier-insight { border-left: 3px solid #6b7280; }
  .tier-concept { border-left: 3px solid #3b82f6; }
  .tier-idea { border-left: 3px solid #f59e0b; }
  .tier-project { border-left: 3px solid #22c55e; }
  .kanban-col { min-width: 220px; flex: 1; }
  .slot-fields { flex: 1; display: flex; flex-direction: column; min-height: 0; margin-top: 6px; gap: 6px; }
  .slot-field-group { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .slot-field-group .field-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); margin-bottom: 2px; flex-shrink: 0; }
  .slot-field-group textarea { flex: 1; min-height: 36px; width: 100%; padding: 4px 6px; border-radius: 4px; font-size: 11px; line-height: 1.4; resize: vertical; background: var(--surface); border: 1px solid var(--border); color: var(--text); }
  .stale-indicator { border-left: 3px solid var(--red); }
  details summary { cursor: pointer; list-style: none; }
  details summary::-webkit-details-marker { display: none; }
  details summary::before { content: '▶ '; font-size: 0.75rem; color: var(--text-dim); }
  details[open] summary::before { content: '▼ '; }
  .tab-active { border-bottom: 2px solid var(--accent); color: var(--accent); }
  .tab-inactive { border-bottom: 2px solid transparent; color: var(--text-dim); }
  .tab-inactive:hover { color: var(--text); }
  .overdue { background: rgba(248, 113, 113, 0.1); border-left: 3px solid var(--red); }
  .today-marker { border-top: 2px solid var(--accent); position: relative; }
  .today-marker::before { content: 'TODAY'; position: absolute; top: -10px; left: 0; font-size: 0.6rem; color: var(--accent); font-weight: 700; background: var(--bg); padding: 0 6px; }
  input[type="text"] { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
  input[type="text"]:focus { outline: none; border-color: var(--accent); }
  select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body class="min-h-screen">

<div id="app" class="mx-auto px-4 py-4" style="min-width: 320px;">
  <!-- Header -->
  <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
    <h1 class="text-xl font-bold" style="color: var(--accent);">Everything Vault</h1>
    <div class="flex items-center gap-2 flex-wrap">
      <span id="build-time" class="text-xs" style="color: var(--text-dim);"></span>
      <button onclick="toggleStats()" id="stats-toggle-btn" class="px-2 py-1 rounded text-xs font-medium"
        style="background: var(--surface2); border: 1px solid var(--border);">▶ Stats</button>
      <button onclick="rebuild()" id="refresh-btn" class="px-2 py-1 rounded text-xs font-medium"
        style="background: var(--surface2); border: 1px solid var(--border);">↻ Refresh</button>
      <button onclick="toggleFunnel()" id="funnel-btn" class="px-2 py-1 rounded text-xs font-medium"
        style="background: var(--surface2); border: 1px solid var(--border);">🌐 Funnel</button>
    </div>
  </div>

  <!-- Funnel status bar (hidden by default) -->
  <div id="funnel-bar" class="mb-3 hidden">
    <div class="surface rounded-lg px-3 py-2 flex items-center gap-3 flex-wrap text-xs">
      <span id="funnel-status-text" style="color: var(--text-dim);">Checking...</span>
      <a id="funnel-url" href="#" target="_blank" class="hidden" style="color: var(--accent); word-break: break-all;"></a>
    </div>
  </div>

  <!-- Stats Bar (collapsed by default on mobile) -->
  <div id="stats-bar" class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-4 collapsed"></div>

  <!-- Tabs -->
  <div class="flex gap-4 mb-4 border-b" style="border-color: var(--border);">
    <button class="tab-active pb-2 px-1 text-sm font-medium" onclick="switchTab('tree')" id="tab-tree">Vault</button>
    <button class="tab-inactive pb-2 px-1 text-sm font-medium" onclick="switchTab('kanban')" id="tab-kanban">Concepts</button>
    <button class="tab-inactive pb-2 px-1 text-sm font-medium" onclick="switchTab('projects')" id="tab-projects">Projects</button>
    <button class="tab-inactive pb-2 px-1 text-sm font-medium" onclick="switchTab('day')" id="tab-day">Day</button>
    <button class="tab-inactive pb-2 px-1 text-sm font-medium" onclick="switchTab('tasks')" id="tab-tasks">Tasks</button>
    <button class="tab-inactive pb-2 px-1 text-sm font-medium" onclick="switchTab('timeline')" id="tab-timeline">Timeline</button>
  </div>

  <!-- Tab content -->
  <div id="view-tree" class="view"></div>
  <div id="view-kanban" class="view hidden"></div>
  <div id="view-projects" class="view hidden"></div>
  <div id="view-day" class="view hidden"></div>
  <div id="view-tasks" class="view hidden"></div>
  <div id="view-timeline" class="view hidden"></div>
</div>

<script>
let DATA = null;
let currentTab = 'tree';

// ── Data loading ──────────────────────────────────────────────
async function loadData() {
  try {
    const resp = await fetch('ev-data.json?t=' + Date.now());
    DATA = await resp.json();
    render();
  } catch (e) {
    document.getElementById('app').innerHTML = `
      <div class="surface p-8 rounded-lg text-center mt-20">
        <h2 class="text-lg font-bold mb-2">No data found</h2>
        <p style="color: var(--text-dim);">Run <code class="px-2 py-1 rounded" style="background: var(--surface2);">python3 build_dashboard.py --vault /path/to/vault</code> to generate ev-data.json</p>
      </div>`;
  }
}

async function rebuild() {
  const btn = document.getElementById('refresh-btn');
  btn.textContent = '↻ Building...';
  btn.disabled = true;
  try {
    await fetch('/rebuild');
    await loadData();
  } catch (e) {
    // Probably opened as file:// — just reload
    location.reload();
  }
  btn.textContent = '↻ Refresh';
  btn.disabled = false;
}

// ── Stats toggle ─────────────────────────────────────────────
function toggleStats() {
  const bar = document.getElementById('stats-bar');
  const btn = document.getElementById('stats-toggle-btn');
  bar.classList.toggle('collapsed');
  const isOpen = !bar.classList.contains('collapsed');
  btn.textContent = (isOpen ? '▼' : '▶') + ' Stats';
}

// ── Tailscale Funnel ─────────────────────────────────────────
let funnelActive = false;

async function checkFunnelStatus() {
  try {
    const res = await fetch('/funnel/status');
    const data = await res.json();
    funnelActive = data.active;
    updateFunnelUI(data);
  } catch (e) {
    // Probably opened as file:// or server doesn't support it
    document.getElementById('funnel-btn').style.display = 'none';
  }
}

function updateFunnelUI(data) {
  const btn = document.getElementById('funnel-btn');
  const bar = document.getElementById('funnel-bar');
  const statusText = document.getElementById('funnel-status-text');
  const urlEl = document.getElementById('funnel-url');

  if (data.active) {
    btn.style.background = 'var(--green)';
    btn.style.color = 'var(--bg)';
    btn.textContent = '🌐 Funnel ON';
    statusText.textContent = 'Funnel active — accessible externally at:';
    statusText.style.color = 'var(--green)';
    if (data.url) {
      urlEl.href = data.url;
      urlEl.textContent = data.url;
      urlEl.classList.remove('hidden');
    }
  } else {
    btn.style.background = 'var(--surface2)';
    btn.style.color = '';
    btn.textContent = '🌐 Funnel';
    statusText.textContent = 'Funnel is off — dashboard only accessible on tailnet.';
    statusText.style.color = 'var(--text-dim)';
    urlEl.classList.add('hidden');
  }
}

async function toggleFunnel() {
  const btn = document.getElementById('funnel-btn');
  const bar = document.getElementById('funnel-bar');
  bar.classList.remove('hidden');

  const newState = !funnelActive;
  btn.textContent = '🌐 ' + (newState ? 'Starting...' : 'Stopping...');
  btn.disabled = true;

  try {
    const res = await fetch('/funnel/toggle', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ enable: newState }),
    });
    const data = await res.json();
    if (res.ok) {
      funnelActive = data.active !== undefined ? data.active : newState;
      updateFunnelUI(data);
    } else {
      alert('Funnel error: ' + (data.error || 'unknown'));
    }
  } catch (e) {
    alert('Funnel error: ' + e.message);
  }
  btn.disabled = false;
}

// Check funnel status on load
checkFunnelStatus();

// ── Render orchestrator ───────────────────────────────────────
function render() {
  renderStats();
  renderTree();
  renderKanban();
  renderProjects();
  renderDay();
  renderTasks();
  renderTimeline();
  const d = new Date(DATA.generated);
  document.getElementById('build-time').textContent = `Built: ${d.toLocaleDateString('en-GB')} ${d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'})}`;
}

// ── Tab switching ─────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
  document.querySelectorAll('[id^="tab-"]').forEach(t => { t.className = 'tab-inactive pb-2 px-1 text-sm font-medium'; });
  document.getElementById('view-' + tab).classList.remove('hidden');
  document.getElementById('tab-' + tab).className = 'tab-active pb-2 px-1 text-sm font-medium';
  currentTab = tab;
}

// ── Stats Bar ─────────────────────────────────────────────────
function renderStats() {
  const s = DATA.stats;
  const cs = s.concept_statuses || {};
  const conceptParts = ['seed','developing','prototype','active','delivered','parked']
    .filter(k => cs[k]).map(k => `${cs[k]} ${k}`).join(' · ');

  document.getElementById('stats-bar').innerHTML = `
    <div class="surface rounded-lg p-3">
      <div class="text-2xl font-bold">${s.total_articles}</div>
      <div class="text-xs" style="color: var(--text-dim);">Articles${s.stale_count ? ` <span style="color: var(--red);">(${s.stale_count} stale)</span>` : ''}</div>
    </div>
    <div class="surface rounded-lg p-3">
      <div class="text-2xl font-bold">${s.total_episodes}</div>
      <div class="text-xs" style="color: var(--text-dim);">Episodes</div>
    </div>
    <div class="surface rounded-lg p-3">
      <div class="text-2xl font-bold">${s.total_concepts}</div>
      <div class="text-xs" style="color: var(--text-dim);">Concepts</div>
      <div class="text-xs mt-1" style="color: var(--text-dim);">${conceptParts}</div>
    </div>
    <div class="surface rounded-lg p-3">
      <div class="text-2xl font-bold">${s.total_tasks_open}</div>
      <div class="text-xs" style="color: var(--text-dim);">Open tasks${s.tasks_overdue ? ` <span style="color: var(--red);">(${s.tasks_overdue} overdue)</span>` : ''}</div>
    </div>
    <div class="surface rounded-lg p-3">
      <div class="text-2xl font-bold">${s.total_tasks_done + s.total_tasks_cancelled}</div>
      <div class="text-xs" style="color: var(--text-dim);">${s.total_tasks_done} done · ${s.total_tasks_cancelled} cancelled</div>
    </div>`;
}

// ── Domain Tree ───────────────────────────────────────────────
function renderTree() {
  const container = document.getElementById('view-tree');

  // Build domain structure
  const domains = {};
  DATA.articles.forEach(a => {
    const parts = a.path.split('/');
    let domain = parts[0];
    let subpath = parts.slice(1).join('/');

    if (!domains[domain]) domains[domain] = { articles: [], subdirs: {} };

    if (parts.length > 2) {
      const subdir = parts[1];
      if (!domains[domain].subdirs[subdir]) domains[domain].subdirs[subdir] = [];
      domains[domain].subdirs[subdir].push(a);
    } else {
      domains[domain].articles.push(a);
    }
  });

  // Source tier (raw ingested material — not articles, has its own data shape).
  // Group by year (from path: sources/<YEAR>/<file>) for browsability.
  const sourcesByYear = {};
  (DATA.sources || []).forEach(s => {
    const parts = s.path.split('/');
    const year = parts.length >= 3 ? parts[1] : '_uncategorised';
    if (!sourcesByYear[year]) sourcesByYear[year] = [];
    sourcesByYear[year].push(s);
  });
  const totalSources = (DATA.sources || []).length;

  // Count per domain
  const domainCounts = {};
  Object.entries(domains).forEach(([d, data]) => {
    domainCounts[d] = data.articles.length + Object.values(data.subdirs).reduce((s, a) => s + a.length, 0);
  });

  let html = `<div class="mb-3"><input type="text" id="tree-search" placeholder="Search articles or sources..." class="w-full px-3 py-2 rounded text-sm" oninput="filterTree()"></div>`;
  html += '<div id="tree-content">';

  // Render Sources tier first if it has any contents — it's a top-level vault folder
  // distinct from the domain-tagged Wiki articles.
  if (totalSources > 0) {
    html += `<details class="surface rounded-lg mb-2 p-0 overflow-hidden" data-domain="sources" open>`;
    html += `<summary class="px-3 py-2 font-medium text-sm flex items-center justify-between" style="background: var(--surface2);">
      <span>sources <span class="text-xs font-normal" style="color: var(--text-dim);">(raw ingested material)</span></span>
      <span class="badge" style="background: var(--border); color: var(--text-dim);">${totalSources}</span></summary>`;
    html += '<div class="px-3 py-2">';
    const sortedYears = Object.keys(sourcesByYear).sort().reverse();
    for (const year of sortedYears) {
      const items = sourcesByYear[year].sort((x,y) => (y.date || '').localeCompare(x.date || ''));
      html += `<details class="ml-2 mb-1" data-subdir="${year}" open>`;
      html += `<summary class="py-1 text-sm" style="color: var(--text-dim);">${year} <span class="badge" style="background: var(--border); color: var(--text-dim);">${items.length}</span></summary>`;
      html += '<div class="ml-4">';
      for (const s of items) {
        html += renderSourceLeaf(s);
      }
      html += '</div></details>';
    }
    html += '</div></details>';
  }

  const sortedDomains = Object.keys(domains).sort();
  for (const domain of sortedDomains) {
    const data = domains[domain];
    const count = domainCounts[domain];
    html += `<details class="surface rounded-lg mb-2 p-0 overflow-hidden" data-domain="${domain}">`;
    html += `<summary class="px-3 py-2 font-medium text-sm flex items-center justify-between" style="background: var(--surface2);">
      <span>${domain}</span><span class="badge" style="background: var(--border); color: var(--text-dim);">${count}</span></summary>`;
    html += '<div class="px-3 py-2">';

    // Subdirectories first.
    // For skills-catalog, each subdir is a skill folder containing multiple companion docs
    // (SKILL.md, SCHEMA.md, README.md, etc.) — render with a "skill bundle" framing.
    const sortedSubs = Object.keys(data.subdirs).sort();
    for (const sub of sortedSubs) {
      const subArticles = data.subdirs[sub];
      const isSkill = (domain === 'skills-catalog');
      const subLabel = isSkill ? `${sub} <span class="text-xs" style="color: var(--text-dim);">(skill — ${subArticles.length} doc${subArticles.length === 1 ? '' : 's'})</span>` : `${sub} <span class="badge" style="background: var(--border); color: var(--text-dim);">${subArticles.length}</span>`;
      html += `<details class="ml-2 mb-1" data-subdir="${sub}">`;
      html += `<summary class="py-1 text-sm" style="color: var(--text-dim);">${subLabel}</summary>`;
      html += '<div class="ml-4">';
      for (const a of subArticles.sort((x,y) => x.title.localeCompare(y.title))) {
        html += renderTreeLeaf(a);
      }
      html += '</div></details>';
    }

    // Root articles
    for (const a of data.articles.sort((x,y) => x.title.localeCompare(y.title))) {
      html += renderTreeLeaf(a);
    }

    html += '</div></details>';
  }

  html += '</div>';
  container.innerHTML = html;
}

function renderSourceLeaf(s) {
  const badges = [];
  if (s.origin) badges.push(`<span class="badge" style="background: var(--surface2); color: var(--text-dim);">${s.origin}</span>`);
  if (s.sensitivity === 'sensitive') badges.push(`<span class="badge badge-sensitive">sensitive</span>`);
  if (s.sensitivity === 'credential') badges.push(`<span class="badge badge-credential">redacted</span>`);
  if (!s.has_sidecar) badges.push(`<span class="badge" style="background: var(--surface2); color: var(--red);">no sidecar</span>`);
  const linkedCount = (s.linked_articles || []).length;
  if (linkedCount > 0) badges.push(`<span class="badge" style="background: var(--surface2); color: var(--text-dim);">→ ${linkedCount} article${linkedCount === 1 ? '' : 's'}</span>`);
  const dateStr = s.date ? `<span class="text-xs" style="color: var(--text-dim);">${s.date}</span>` : '';
  const searchBlob = `${(s.title || '').toLowerCase()} ${s.filename.toLowerCase()} ${(s.origin || '').toLowerCase()}`;
  return `<div class="py-1 ml-2 text-sm flex items-center gap-2 tree-leaf" data-title="${searchBlob}" data-tags="source ${(s.origin || '').toLowerCase()}">
    <span class="truncate" style="max-width: 280px;" title="${s.path}">${s.title || s.filename}</span>
    ${dateStr}
    <span class="flex gap-1 flex-shrink-0">${badges.join('')}</span>
  </div>`;
}

function renderTreeLeaf(a) {
  const badges = [];
  if (a.type) badges.push(`<span class="badge" style="background: var(--surface2); color: var(--text-dim);">${a.type}</span>`);
  if (a.sensitivity === 'sensitive') badges.push(`<span class="badge badge-sensitive">sensitive</span>`);
  if (a.sensitivity === 'credential') badges.push(`<span class="badge badge-credential">redacted</span>`);
  if (a.confidence) badges.push(`<span class="badge badge-${a.confidence}">${a.confidence}</span>`);

  // Staleness check
  let staleClass = '';
  if (a.last_verified) {
    const verified = new Date(a.last_verified);
    const sixMonthsAgo = new Date();
    sixMonthsAgo.setMonth(sixMonthsAgo.getMonth() - 6);
    if (verified < sixMonthsAgo) staleClass = ' stale-indicator';
  }

  return `<div class="py-1 ml-2 text-sm flex items-center gap-2 tree-leaf${staleClass}" data-title="${(a.title||'').toLowerCase()}" data-tags="${(a.tags||[]).join(' ').toLowerCase()}">
    <span class="truncate" style="max-width: 300px;" title="${a.path}">${a.title || a.path.split('/').pop()}</span>
    <span class="flex gap-1 flex-shrink-0">${badges.join('')}</span>
  </div>`;
}

function filterTree() {
  const q = document.getElementById('tree-search').value.toLowerCase().trim();
  document.querySelectorAll('.tree-leaf').forEach(leaf => {
    const title = leaf.dataset.title || '';
    const tags = leaf.dataset.tags || '';
    leaf.style.display = (!q || title.includes(q) || tags.includes(q)) ? '' : 'none';
  });
  // Auto-expand domains that have visible results
  if (q) {
    document.querySelectorAll('#tree-content details').forEach(d => {
      const hasVisible = d.querySelector('.tree-leaf:not([style*="display: none"])');
      if (hasVisible) d.open = true;
    });
  }
}

// ── Concepts Kanban ───────────────────────────────────────────
let conceptScope = 'personal'; // 'personal' | 'work' | 'both'

function setConceptScope(scope) {
  conceptScope = scope;
  renderKanban();
}

function conceptAppliesTo(c) {
  // Explicit field takes priority
  const at = (c.applies_to || '').toLowerCase();
  if (at === 'both' || at === 'work' || at === 'personal') return at;
  // Fall back to domain/tag heuristic
  const doms = (c.domains || []).map(d => String(d).toLowerCase());
  const tags = (c.tags || []).map(t => String(t).toLowerCase());
  return (doms.includes('work') || tags.includes('work')) ? 'work' : 'personal';
}

function isWorkConcept(c) {
  const at = conceptAppliesTo(c);
  return at === 'work' || at === 'both';
}

function isPersonalConcept(c) {
  const at = conceptAppliesTo(c);
  return at === 'personal' || at === 'both';
}

function isBothConcept(c) {
  return conceptAppliesTo(c) === 'both';
}

// Derive a Concepts-kanban column from tier + status (both use the current
// canonical vocabulary via statusAlias).
function conceptColumn(c) {
  const status = canonicalStatus(c.status);
  if (status === 'delivered-and-parked') return 'parked';
  const tier = c.tier || 'concept';
  if (tier === 'insight') return 'insight';
  if (tier === 'concept') return 'developing-concept';
  if (tier === 'idea') {
    // Nascent (status=ideas) vs ripening toward project (status=under-development+)
    return status === 'ideas' ? 'idea' : 'candidate-project';
  }
  if (tier === 'project') return 'active-project';
  return 'idea';
}

function renderKanban() {
  const container = document.getElementById('view-kanban');
  const columns = [
    'insight', 'idea', 'developing-concept',
    'candidate-project', 'active-project', 'parked',
  ];
  const columnLabels = {
    'insight':           'Insights',
    'idea':              'Ideas',
    'developing-concept':'Developing concept',
    'candidate-project': 'Candidate project',
    'active-project':    'Active project',
    'parked':            'Parked',
  };
  const columnColors = {
    'insight':           '#6b7280',
    'idea':              '#f59e0b',
    'developing-concept':'#3b82f6',
    'candidate-project': '#8b5cf6',
    'active-project':    '#22c55e',
    'parked':            '#818cf8',
  };
  const tierColors = { insight: '#6b7280', concept: '#3b82f6', idea: '#f59e0b', project: '#22c55e' };
  const tierLabels = { insight: 'I', concept: 'C', idea: 'D', project: 'P' };

  // Scope split — 'both' items appear in both personal and work views
  const all = DATA.concepts || [];
  const personal = all.filter(c => isPersonalConcept(c));
  const work     = all.filter(c => isWorkConcept(c));
  const both     = all.filter(c => isBothConcept(c));
  let current;
  if (conceptScope === 'work') current = work;
  else if (conceptScope === 'both') current = both;
  else current = personal;

  // Group into columns using derived column logic
  const groups = {};
  columns.forEach(c => groups[c] = []);
  current.forEach(c => {
    const col = conceptColumn(c);
    (groups[col] || groups['idea']).push(c);
  });
  Object.values(groups).forEach(g =>
    g.sort((a, b) => (b.last_updated || '').localeCompare(a.last_updated || ''))
  );

  const scopeBtn = (key, label, count) => `
    <button onclick="setConceptScope('${key}')" class="px-3 py-1 rounded text-xs font-medium"
      style="background: ${conceptScope===key ? 'var(--accent)' : 'var(--surface2)'};
             color: ${conceptScope===key ? 'var(--bg)' : 'var(--text-dim)'};">
      ${label} <span style="opacity:0.7;">(${count})</span>
    </button>`;

  let html = `
    <div class="flex flex-wrap items-center gap-3 mb-3">
      <div class="flex gap-1">
        ${scopeBtn('personal', 'Personal', personal.length)}
        ${scopeBtn('work', 'Work', work.length)}
        ${scopeBtn('both', 'Both', both.length)}
      </div>
      <input type="text" id="kanban-search" placeholder="Filter concepts..."
        class="px-3 py-2 rounded text-sm flex-1 min-w-0" oninput="filterKanban()">
    </div>`;

  const onBoard = buildOnBoard();
  // Build title→slug lookup from articles (concepts don't carry path in DATA.concepts)
  const slugByTitle = {};
  for (const a of (DATA.articles || [])) { if (a.title) slugByTitle[a.title] = pathStem(a.path); }

  html += '<div class="flex gap-3 overflow-x-auto pb-4" id="kanban-board">';

  for (const col of columns) {
    const items = groups[col];
    const colColor = columnColors[col];
    html += `<div class="kanban-col">`;
    html += `<div class="surface2 rounded-t-lg px-3 py-2 text-sm font-medium flex justify-between items-center gap-2"
      style="border-top: 2px solid ${colColor};">
      <span class="truncate" title="${col}">${columnLabels[col]}</span>
      <span class="badge flex-shrink-0" style="background: var(--border); color: var(--text-dim);">${items.length}</span>
    </div>`;
    html += `<div class="surface rounded-b-lg p-2 space-y-2" style="min-height: 100px;">`;

    for (const c of items) {
      const tier = c.tier || 'concept';
      const color = tierColors[tier] || '#6b7280';
      const label = tierLabels[tier] || '?';
      const slug = slugByTitle[c.title] || '';
      const isOnBoard = slug && onBoard.has(`concept:${slug}`);

      // Stale check (60 days)
      let stale = false;
      if (c.last_updated) {
        const updated = new Date(c.last_updated);
        const sixtyDaysAgo = new Date();
        sixtyDaysAgo.setDate(sixtyDaysAgo.getDate() - 60);
        if (updated < sixtyDaysAgo) stale = true;
      }

      const tags = (c.tags || []).slice(0, 4).join(', ');
      const bothBadge = isBothConcept(c)
        ? `<span class="badge flex-shrink-0" style="background:#8b5cf622;color:#8b5cf6;border:1px solid #8b5cf644;font-size:9px;">W+P</span>`
        : '';
      const rels = (c.relationships || []).slice(0, 3).map(r =>
        `<span class="text-xs" style="color: var(--text-dim);">→ ${r.type}: ${r.ref}</span>`
      ).join('<br>');

      const pinBtn = slug
        ? (isOnBoard
            ? `<span class="badge" style="background:var(--accent)22;color:var(--accent);border:1px solid var(--accent)44;flex-shrink:0;">📌 day</span>`
            : `<button onclick="pinToDay('concept','${escapeHtml(slug)}')" title="Pin to Day board"
                class="text-[10px] px-1.5 py-0.5 rounded flex-shrink-0"
                style="background:var(--surface);color:var(--accent);border:1px solid var(--border);">📌</button>`)
        : '';

      html += `<div class="surface2 rounded p-2 kanban-card"
        style="border-left: 3px solid ${color};${isOnBoard ? ' outline: 1px solid var(--accent)44;' : ''}"
        data-title="${(c.title||'').toLowerCase()}" data-tags="${(c.tags||[]).join(' ').toLowerCase()}">
        <div class="flex justify-between items-start mb-1 gap-1">
          <span class="text-sm font-medium leading-tight">${c.title}</span>
          <div class="flex items-center gap-1 flex-shrink-0">
            ${pinBtn}
            ${bothBadge}
            <span class="badge" style="background: ${color}22; color: ${color}; border: 1px solid ${color};">${label}</span>
          </div>
        </div>
        ${tags ? `<div class="text-xs mb-1" style="color: var(--text-dim);">${tags}</div>` : ''}
        <div class="text-xs" style="color: var(--text-dim);">${c.last_updated || '—'}${stale ? ' <span style="color: var(--red);">⚠ stale</span>' : ''}</div>
        ${rels ? `<div class="mt-1">${rels}</div>` : ''}
        ${c.path ? `<div class="flex items-center gap-2 mt-1 text-xs" style="color: var(--text-dim);">
          <label class="flex items-center gap-1 cursor-pointer">
            <input type="checkbox" ${(c.domains || []).map(d => String(d).toLowerCase()).includes('concepts') ? 'checked' : ''}
              onchange="toggleDomain('${escapeHtml(c.path)}','concepts',this)">
            <span>concept</span>
          </label>
          <label class="flex items-center gap-1 cursor-pointer">
            <input type="checkbox" ${(c.domains || []).map(d => String(d).toLowerCase()).includes('projects') ? 'checked' : ''}
              onchange="toggleDomain('${escapeHtml(c.path)}','projects',this)">
            <span>project</span>
          </label>
        </div>
        <div class="mt-1">
          <select onchange="moveConcept('${escapeHtml(c.path)}','${col}',this)"
            class="text-xs rounded px-1 py-0.5 w-full"
            style="background:var(--surface);color:var(--text-dim);border:1px solid var(--border);cursor:pointer;">
            <option value="">Move to...</option>
            ${CONCEPT_COLUMNS.filter(cc => cc.key !== col).map(cc =>
              `<option value="${cc.key}">${cc.label}</option>`
            ).join('')}
          </select>
        </div>` : ''}
      </div>`;
    }

    html += '</div></div>';
  }

  html += '</div>';
  container.innerHTML = html;
}

function filterKanban() {
  const q = document.getElementById('kanban-search').value.toLowerCase().trim();
  document.querySelectorAll('.kanban-card').forEach(card => {
    const title = card.dataset.title || '';
    const tags = card.dataset.tags || '';
    card.style.display = (!q || title.includes(q) || tags.includes(q)) ? '' : 'none';
  });
}

const CONCEPT_COLUMNS = [
  { key: 'insight',            label: 'Insight' },
  { key: 'developing-concept', label: 'Concept' },
  { key: 'idea',               label: 'Idea' },
  { key: 'candidate-project',  label: 'Candidate' },
  { key: 'active-project',     label: 'Active Project' },
  { key: 'parked',             label: 'Parked' },
];

async function moveConcept(path, currentCol, selectEl) {
  const newCol = selectEl.value;
  if (!newCol || newCol === currentCol) { selectEl.value = ''; return; }
  selectEl.disabled = true;
  try {
    const res = await fetch('/concept/move', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path, column: newCol }),
    });
    const data = await res.json();
    if (!res.ok) { alert(data.error || 'Move failed'); selectEl.value = ''; selectEl.disabled = false; return; }
    // Refresh data and re-render
    const r2 = await fetch('/ev-data.json?' + Date.now());
    DATA = await r2.json();
    renderKanban();
  } catch (e) { alert('Error: ' + e.message); selectEl.value = ''; selectEl.disabled = false; }
}

// ── Projects Kanban (Personal / Work) ─────────────────────────
let projectScope = 'personal';
let projectPlatformFilter = null;  // null = all platforms; otherwise a platform slug

function setProjectScope(scope) {
  projectScope = scope;
  renderProjects();
}

function setProjectPlatformFilter(platform) {
  // Toggle off if clicking the active one; otherwise switch to the new platform.
  projectPlatformFilter = (projectPlatformFilter === platform) ? null : platform;
  renderProjects();
}

function isWorkProject(p) {
  const domains = (p.domains || []).map(d => String(d).toLowerCase());
  const tags = (p.tags || []).map(t => String(t).toLowerCase());
  return domains.includes('work') || tags.includes('work');
}

// ── Status vocabulary (shared by Projects + Concepts kanbans) ─────
// Vocabulary history 2026-04-24: seed → ideas; developing → active (then
// active → under-development); active → under-development; delivered →
// delivered-and-operational; parked & delivered-and-retired →
// delivered-and-parked. Any residual legacy status is coerced here.
const statusAlias = {
  seed:                         'ideas',
  developing:                   'under-development',
  active:                       'under-development',
  delivered:                    'delivered-and-operational',
  'delivered-and-retired':      'delivered-and-parked',
  parked:                       'delivered-and-parked',
};
const statusLabels = {
  'under-development':         'under development',
  'delivered-and-operational': 'delivered · operational',
  'delivered-and-parked':      'delivered · parked',
};
const canonicalStatus = (s) => statusAlias[s] || s || 'ideas';
const labelFor = (s) => statusLabels[s] || s;

// Project-card sub-line: code_path 📁 + github ⌥ link, or '' if neither.
// Built with string concat to avoid nesting template literals inside the
// project-card template (which broke render in v3.0 development).
function renderProjectPaths(p) {
  const parts = [];
  if (p.code_path) {
    parts.push('<span title="code_path">📁 ' + escapeHtml(p.code_path) + '</span>');
  }
  if (p.github) {
    let label = p.github;
    const m = p.github.match(/github\.com\/(.+?)(?:\.git)?$/);
    if (m) label = m[1];
    parts.push(
      '<a href="' + escapeHtml(p.github) + '" target="_blank" ' +
      'style="color: var(--accent);" title="github">⌥ ' +
      escapeHtml(label) + '</a>'
    );
  }
  if (parts.length === 0) return '';
  return '<div class="text-xs mb-1" style="color: var(--text-dim); ' +
         'font-family: monospace; word-break: break-all;">' +
         parts.join(' · ') + '</div>';
}

function renderProjects() {
  const container = document.getElementById('view-projects');
  if (!container) return;

  const columns = [
    'ideas',
    'prototype',
    'under-development',
    'delivered-and-operational',
    'delivered-and-parked',
  ];
  const statusColors = {
    ideas:                        '#f59e0b',
    prototype:                    '#a855f7',
    'under-development':          '#22c55e',
    'delivered-and-operational':  '#3b82f6',
    'delivered-and-parked':       '#818cf8',
  };

  // All tier=project articles (pull from DATA.articles so work-domain projects
  // outside the concepts domain still appear).
  const allProjects = (DATA.articles || []).filter(a => a.tier === 'project');
  const personal = allProjects.filter(p => !isWorkProject(p));
  const work     = allProjects.filter(p =>  isWorkProject(p));
  const scoped   = projectScope === 'work' ? work : personal;

  // Platform filter chips — built from the visible (post-scope) projects so
  // the chip set narrows when you switch Personal/Work.
  const platformCounts = {};
  for (const p of scoped) {
    const k = p.development_platform || 'unknown';
    platformCounts[k] = (platformCounts[k] || 0) + 1;
  }
  const platformOrder = Object.keys(platformCounts).sort((a, b) =>
    platformCounts[b] - platformCounts[a] || a.localeCompare(b)
  );

  // Apply active platform filter (if any)
  const current = projectPlatformFilter
    ? scoped.filter(p => (p.development_platform || 'unknown') === projectPlatformFilter)
    : scoped;

  // Group by status
  const groups = {};
  columns.forEach(c => groups[c] = []);
  current.forEach(p => {
    const s = canonicalStatus(p.status);
    (groups[s] || groups['developing']).push(p);
  });
  Object.values(groups).forEach(g =>
    g.sort((a, b) => (b.last_updated || '').localeCompare(a.last_updated || ''))
  );

  const scopeBtn = (key, label, count) => `
    <button onclick="setProjectScope('${key}')" class="px-3 py-1 rounded text-xs font-medium"
      style="background: ${projectScope===key ? 'var(--accent)' : 'var(--surface2)'};
             color: ${projectScope===key ? 'var(--bg)' : 'var(--text-dim)'};">
      ${label} <span style="opacity:0.7;">(${count})</span>
    </button>`;

  // Platform-filter chip row — clickable; one acts as "All".
  const allBtn = `
    <button onclick="setProjectPlatformFilter(null)" class="px-2 py-0.5 rounded text-xs"
      style="background: ${projectPlatformFilter === null ? 'var(--accent)' : 'var(--surface2)'};
             color: ${projectPlatformFilter === null ? 'var(--bg)' : 'var(--text-dim)'};
             border: 1px solid var(--border);">
      All <span style="opacity:0.7;">(${scoped.length})</span>
    </button>`;
  const platformChips = platformOrder.map(slug => {
    const label = platformLabels[slug] || slug;
    const color = platformColors[slug] || '#6b7280';
    const active = projectPlatformFilter === slug;
    return `<button onclick="setProjectPlatformFilter('${slug}')" class="px-2 py-0.5 rounded text-xs"
      title="${slug}"
      style="background: ${active ? color : 'var(--surface2)'};
             color: ${active ? '#fff' : color};
             border: 1px solid ${color}66;">
      ${label} <span style="opacity:0.7;">(${platformCounts[slug]})</span>
    </button>`;
  }).join('');

  let html = `
    <div class="flex flex-wrap items-center gap-3 mb-2">
      <div class="flex gap-1">
        ${scopeBtn('personal', 'Personal', personal.length)}
        ${scopeBtn('work', 'Work', work.length)}
      </div>
      <input type="text" id="project-search" placeholder="Filter projects..."
        class="px-3 py-2 rounded text-sm flex-1 min-w-0" oninput="filterProjects()">
    </div>
    <div class="flex flex-wrap items-center gap-1 mb-3">
      <span class="text-xs mr-1" style="color: var(--text-dim);">Platform:</span>
      ${allBtn}
      ${platformChips}
    </div>`;

  // Recent status transitions strip — last 14 days, scoped to the current tab
  const visibleSlugs = new Set(current.map(p => (p.path || '').split('/').pop().replace('.md', '')));
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 14);
  const transitions = (DATA.status_transitions || [])
    .filter(t => t.date && new Date(t.date) >= cutoff)
    .filter(t => visibleSlugs.has(t.slug))
    .slice(0, 20);
  if (transitions.length > 0) {
    const chips = transitions.map(t => {
      const fromColor = statusColors[t.from_status] || '#6b7280';
      const toColor   = statusColors[t.to_status]   || '#6b7280';
      const src = String(t.source || '').toLowerCase();
      const inferred = src.includes('inference') || src.includes('nightly');
      const badge = inferred
        ? `<span class="badge ml-1" style="background:${toColor}22;color:${toColor};border:1px solid ${toColor}44;">auto</span>`
        : '';
      return `
        <div class="surface2 rounded px-2 py-1 flex items-center gap-2 text-xs"
          style="border-left: 3px solid ${toColor};"
          title="${(t.reason||'').replace(/"/g,'&quot;')}">
          <span class="font-medium">${t.title || t.slug}</span>
          <span style="color:${fromColor};">${labelFor(t.from_status)}</span>
          <span style="color: var(--text-dim);">→</span>
          <span style="color:${toColor}; font-weight:600;">${labelFor(t.to_status)}</span>
          <span style="color: var(--text-dim);">· ${t.date}</span>
          ${badge}
        </div>`;
    }).join('');
    html += `
      <div class="mb-3">
        <div class="text-xs mb-1" style="color: var(--text-dim);">
          Recent transitions <span style="opacity:0.7;">(last 14 days · ${projectScope})</span>
        </div>
        <div class="flex flex-wrap gap-2">${chips}</div>
      </div>`;
  }

  if (current.length === 0) {
    html += `<div class="surface p-6 rounded-lg text-center" style="color: var(--text-dim);">
      No ${projectScope} projects with <code>tier: project</code> yet.
    </div>`;
    container.innerHTML = html;
    return;
  }

  const onBoard = buildOnBoard();

  html += '<div class="flex gap-3 overflow-x-auto pb-4">';

  for (const col of columns) {
    const items = groups[col];
    const colColor = statusColors[col] || '#6b7280';
    html += `<div class="kanban-col">`;
    html += `<div class="surface2 rounded-t-lg px-3 py-2 text-sm font-medium flex justify-between items-center gap-2"
      style="border-top: 2px solid ${colColor};">
      <span class="truncate" title="${col}">${labelFor(col)}</span>
      <span class="badge flex-shrink-0" style="background: var(--border); color: var(--text-dim);">${items.length}</span>
    </div>`;
    html += `<div class="surface rounded-b-lg p-2 space-y-2" style="min-height: 100px;">`;

    for (const p of items) {
      const slug = pathStem(p.path);
      const isOnBoard = onBoard.has(`project:${slug}`);

      // Stale check (60 days)
      let stale = false;
      if (p.last_updated) {
        const updated = new Date(p.last_updated);
        const sixtyDaysAgo = new Date();
        sixtyDaysAgo.setDate(sixtyDaysAgo.getDate() - 60);
        if (updated < sixtyDaysAgo) stale = true;
      }

      const tags = (p.tags || []).slice(0, 4).join(', ');
      const domains = (p.domains || []).filter(d => d !== 'concepts').slice(0, 3).join(' · ');
      const rels = (p.relationships || []).slice(0, 3).map(r =>
        `<span class="text-xs" style="color: var(--text-dim);">→ ${r.type}: ${r.ref}</span>`
      ).join('<br>');

      const pinBtn = isOnBoard
        ? `<span class="badge" style="background:var(--accent)22;color:var(--accent);border:1px solid var(--accent)44;flex-shrink:0;">📌 day</span>`
        : `<button onclick="pinToDay('project','${escapeHtml(slug)}')" title="Pin to Day board"
            class="text-[10px] px-1.5 py-0.5 rounded flex-shrink-0"
            style="background:var(--surface);color:var(--accent);border:1px solid var(--border);">📌</button>`;

      const platformChip = p.development_platform
        ? platformBadge(p.development_platform, { compact: true })
        : '';

      html += `<div class="surface2 rounded p-2 project-card"
        style="border-left: 3px solid ${colColor};${isOnBoard ? ' outline: 1px solid var(--accent)44;' : ''}"
        data-title="${(p.title||'').toLowerCase()}"
        data-tags="${(p.tags||[]).join(' ').toLowerCase()}"
        data-domains="${(p.domains||[]).join(' ').toLowerCase()}"
        data-platform="${(p.development_platform || '').toLowerCase()}">
        <div class="flex justify-between items-start mb-1 gap-1">
          <span class="text-sm font-medium leading-tight">${p.title}</span>
          <div class="flex items-center gap-1 flex-shrink-0">
            ${pinBtn}
            ${platformChip}
            <span class="badge" style="background: ${colColor}22; color: ${colColor}; border: 1px solid ${colColor};">P</span>
          </div>
        </div>
        ${domains ? `<div class="text-xs mb-1" style="color: var(--text-dim);">${domains}</div>` : ''}
        ${tags ? `<div class="text-xs mb-1" style="color: var(--text-dim);">${tags}</div>` : ''}
        ${renderProjectPaths(p)}
        <div class="text-xs" style="color: var(--text-dim);">
          ${p.last_updated || '—'}${stale ? ' <span style="color: var(--red);">⚠ stale</span>' : ''}
        </div>
        ${rels ? `<div class="mt-1">${rels}</div>` : ''}
        <div class="flex items-center gap-2 mt-1 text-xs" style="color: var(--text-dim);">
          <label class="flex items-center gap-1 cursor-pointer">
            <input type="checkbox" ${(p.domains || []).map(d => String(d).toLowerCase()).includes('concepts') ? 'checked' : ''}
              onchange="toggleDomain('${escapeHtml(p.path)}','concepts',this)">
            <span>concept</span>
          </label>
          <label class="flex items-center gap-1 cursor-pointer">
            <input type="checkbox" ${(p.domains || []).map(d => String(d).toLowerCase()).includes('projects') ? 'checked' : ''}
              onchange="toggleDomain('${escapeHtml(p.path)}','projects',this)">
            <span>project</span>
          </label>
        </div>
        <div class="mt-1">
          <select onchange="moveProject('${escapeHtml(p.path)}','${col}',this)"
            class="text-xs rounded px-1 py-0.5 w-full"
            style="background:var(--surface);border:1px solid var(--border);color:var(--text-dim);">
            <option value="">Move to…</option>
            ${PROJECT_COLUMNS.filter(pc => pc.key !== col).map(pc =>
              `<option value="${pc.key}">${pc.label}</option>`
            ).join('')}
          </select>
        </div>
      </div>`;
    }

    html += '</div></div>';
  }

  html += '</div>';
  container.innerHTML = html;
}

function filterProjects() {
  const q = document.getElementById('project-search').value.toLowerCase().trim();
  document.querySelectorAll('.project-card').forEach(card => {
    const title = card.dataset.title || '';
    const tags = card.dataset.tags || '';
    const domains = card.dataset.domains || '';
    const platform = card.dataset.platform || '';
    card.style.display = (!q || title.includes(q) || tags.includes(q) || domains.includes(q) || platform.includes(q)) ? '' : 'none';
  });
}

// ── Project column move ──────────────────────────────────────────
const PROJECT_COLUMNS = [
  { key: 'ideas',                      label: 'Ideas' },
  { key: 'prototype',                  label: 'Prototype' },
  { key: 'under-development',          label: 'Under Development' },
  { key: 'delivered-and-operational',   label: 'Delivered · Operational' },
  { key: 'delivered-and-parked',        label: 'Delivered · Parked' },
];

async function moveProject(path, currentCol, selectEl) {
  const newCol = selectEl.value;
  if (!newCol || newCol === currentCol) { selectEl.value = ''; return; }
  selectEl.disabled = true;
  try {
    const res = await fetch('/project/move', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path, column: newCol }),
    });
    const data = await res.json();

function platformBadge(platform, opts = {}) {

  const cls = opts.compact ? 'badge text-[10px]' : 'badge';

    style="background:${color}22;color:${color};border:1px solid ${color}66;">${label}</span>`;
}

const SLOT_FIELD_LABELS = {

  next:          'Next',
  holding:       'Holding',
  notes:         'Notes',
};

function pathStem(p) {
  const base = String(p || '').split('/').pop();
  return base.replace(/\.md$/, '');
}

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function isProjectStale(a, days) {
  if (!a || !a.last_updated) return false;
  const updated = new Date(a.last_updated);
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - (days || 60));
  return updated < cutoff;
}

function classifyCategory(article, task) {
  // Personal vs Work — derived from underlying article's domains/tags.
  // Tasks default to personal unless their source path begins with work/.
  if (article) {
    const doms = (article.domains || []).map(d => String(d).toLowerCase());
    const tags = (article.tags || []).map(t => String(t).toLowerCase());
    if (doms.includes('work') || tags.includes('work')) return 'work';
    return 'personal';
  }
  if (task) {
    const src = String(task.source || '').toLowerCase();
    if (src.startsWith('work/') || src.startsWith('work ') || src === 'work') return 'work';
  }
  return 'personal';
}

function categoryBadge(cat) {
  if (cat === 'work') {
    return `<span class="badge" style="background:#1e3a5f;color:#7dd3fc;">WORK</span>`;
  }
  return `<span class="badge" style="background:#3b1d4f;color:#d8b4fe;">PERS</span>`;
}

async function boardPost(path, body) {
  try {
    const resp = await fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await resp.json();
    if (!resp.ok) {
      console.warn('board POST failed', path, data);
      return { ok: false, error: data.error || 'unknown error' };
    }
    return { ok: true, result: data };
  } catch (e) {
    console.warn('board POST network error', path, e);
    return { ok: false, error: String(e) };
  }
}

// ── Picker state ──────────────────────────────────────────────────

let pickerOpenForPosition = null;
let pickerFilter = '';

function openPicker(position) {
  pickerOpenForPosition = position;
  pickerFilter = '';
  renderDay();
  setTimeout(() => {
    const input = document.getElementById('picker-input');
    if (input) input.focus();
  }, 0);
}

function closePicker() {
  pickerOpenForPosition = null;
  pickerFilter = '';
  renderDay();
}

function setPickerFilter(v) {
  pickerFilter = String(v || '').toLowerCase();
  // Re-render only the picker list (avoids losing input focus).
  const list = document.getElementById('picker-list');
  if (list) list.innerHTML = pickerListHtml();
}

function pickerCandidates() {
  // Currently-on-board refs to grey out
  const onBoard = new Set();
  for (const s of (DATA.board?.slots || [])) {
    if (s.type === 'project' || s.type === 'concept') onBoard.add(`${s.type}:${s.ref}`);
    if (s.type === 'task') onBoard.add(`task:${s.ref}`);
    if (s.type === 'todos') onBoard.add('todos:todays-todos');
  }

  const items = [];
  // Today's todos slot — only offer if not already used
  if (!onBoard.has('todos:todays-todos')) {
    items.push({ kind: 'todos', label: "Today's todos", sub: 'Curated checklist of T-numbers' });
  }
  // Projects (tier=project)
  for (const a of (DATA.articles || [])) {
    if (a.tier !== 'project') continue;
    const slug = pathStem(a.path);
    items.push({
      kind: 'project',
      ref: slug,
      label: a.title || slug,
      sub: `project · ${labelFor(canonicalStatus(a.status))}`,
      onBoard: onBoard.has(`project:${slug}`),
    });
  }
  // Concepts (tier=concept|idea|insight) — tier=project handled above
  for (const a of (DATA.articles || [])) {
    const tier = a.tier;
    if (!tier || tier === 'project') continue;
    const slug = pathStem(a.path);
    items.push({
      kind: 'concept',
      ref: slug,
      label: a.title || slug,
      sub: `${tier}`,
      onBoard: onBoard.has(`concept:${slug}`),
    });
  }
  // Open tasks
  for (const t of (DATA.tasks || [])) {
    if (t.status !== 'open') continue;
    items.push({
      kind: 'task',
      ref: t.id,
      label: `${t.id} · ${t.task}`,
      sub: t.due ? `due ${t.due}` : '',
      onBoard: onBoard.has(`task:${t.id}`),
    });
  }
  // Filter
  if (pickerFilter) {
    return items.filter(it =>
      (it.label || '').toLowerCase().includes(pickerFilter) ||
      (it.sub || '').toLowerCase().includes(pickerFilter)
    );
  }
  return items;
}

function pickerListHtml() {
  const items = pickerCandidates();
  if (!items.length) {
    return `<div class="text-xs p-3" style="color: var(--text-dim);">No matches.</div>`;
  }
  return items.map((it, i) => {
    const disabled = it.onBoard;
    const cls = disabled ? 'opacity-40 cursor-not-allowed' : 'hover:bg-slate-700 cursor-pointer';
    const onclick = disabled
      ? ''
      : (it.kind === 'todos'
          ? `onclick="pickAssignTodos()"`
          : `onclick="pickAssign('${it.kind}','${escapeHtml(it.ref)}')"`);
    return `
      <div class="px-2 py-1.5 rounded text-xs ${cls}" ${onclick}>
        <div class="font-medium">${escapeHtml(it.label)}${disabled ? ' <span class="text-[10px]" style="color: var(--text-dim);">(on board)</span>' : ''}</div>
        ${it.sub ? `<div class="text-[11px]" style="color: var(--text-dim);">${escapeHtml(it.sub)}</div>` : ''}
      </div>`;
  }).join('');
}

async function pinToDay(apiType, ref) {
  const occupied = new Set((DATA.board?.slots || [])
    .filter(s => s.type !== 'empty').map(s => s.position));
  const emptyPos = [1,2,3,4,5].find(i => !occupied.has(i));
  if (!emptyPos) { alert('Day board is full — dismiss a slot first.'); return; }
  const r = await boardPost('/board/assign', { position: emptyPos, ref, type: apiType });
  if (!r.ok) { alert('Pin failed: ' + r.error); return; }
  await refreshBoard();
  switchTab('day');

function renderThreadSlot(slot) {
  const taskLookup = window._dayTaskLookup || {};
  const articleLookup = window._dayArticleLookup || {};

  const isTask = slot.type === 'task';
  const t = isTask ? taskLookup[slot.ref] : null;
  const a = !isTask ? articleLookup[slot.ref] : null;

  const title = isTask
    ? (t ? t.task : '(task not found)')
    : (a ? (a.title || slot.ref) : '(article not found)');

  let subtitle = '';
  if (isTask && t) {
    subtitle = `${t.id} · task`;
    if (t.due) subtitle += ` · due ${t.due}`;
  } else if (a) {

// ── Task List ─────────────────────────────────────────────────
let taskFilter = 'open';
let taskSort = { col: 'default', dir: 'asc' };

const TASK_STATUS_ORDER = { open: 0, done: 1, cancelled: 2 };
const TASK_PRIORITY_ORDER = { high: 0, medium: 1, low: 2 };

function defaultTaskSort(a, b) {
  // Status: open first
  const sd = (TASK_STATUS_ORDER[a.status] ?? 99) - (TASK_STATUS_ORDER[b.status] ?? 99);
  if (sd !== 0) return sd;
  // Due date (soonest first, empty last)
  if (a.due && b.due) return a.due.localeCompare(b.due);
  if (a.due) return -1;
  if (b.due) return 1;
  // Priority
  return (TASK_PRIORITY_ORDER[a.priority] ?? 3) - (TASK_PRIORITY_ORDER[b.priority] ?? 3);
}

function taskColumnComparator(col) {
  // Empty values always sort to the bottom (after direction flip).
  const empty = v => v === undefined || v === null || v === '';
  const cmpWithEmptyLast = (av, bv, inner) => {
    if (empty(av) && empty(bv)) return 0;
    if (empty(av)) return 1;
    if (empty(bv)) return -1;
    return inner(av, bv);
  };
  switch (col) {
    case 'id':       return (a, b) => cmpWithEmptyLast(a.id, b.id, (x, y) => String(x).localeCompare(String(y), undefined, { numeric: true }));
    case 'task':     return (a, b) => cmpWithEmptyLast(a.task, b.task, (x, y) => String(x).localeCompare(String(y)));
    case 'status':   return (a, b) => (TASK_STATUS_ORDER[a.status] ?? 99) - (TASK_STATUS_ORDER[b.status] ?? 99);
    case 'priority': return (a, b) => (TASK_PRIORITY_ORDER[a.priority] ?? 3) - (TASK_PRIORITY_ORDER[b.priority] ?? 3);
    case 'due':      return (a, b) => cmpWithEmptyLast(a.due, b.due, (x, y) => x.localeCompare(y));
    default:         return defaultTaskSort;
  }
}

function setTaskSort(col) {
  if (taskSort.col === col) {
    taskSort.dir = taskSort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    taskSort.col = col;
    taskSort.dir = 'asc';
  }
  renderTasks();
}

function taskSortArrow(col) {
  if (taskSort.col !== col) return '<span style="opacity:0.25;">↕</span>';
  return taskSort.dir === 'asc' ? '↑' : '↓';
}

function renderTasks() {
  const container = document.getElementById('view-tasks');
  const today = new Date().toISOString().slice(0, 10);

  let tasks = [...DATA.tasks];

  // Filter
  if (taskFilter !== 'all') {
    tasks = tasks.filter(t => t.status === taskFilter);
  }

  // Sort (column-driven if a column is selected, else the composite default)
  const cmp = taskColumnComparator(taskSort.col);
  tasks.sort((a, b) => {
    const primary = cmp(a, b);
    if (primary !== 0) return taskSort.dir === 'desc' ? -primary : primary;
    // Tie-break with the default composite so rows stay stable/useful when the
    // primary column has repeated values (e.g. many 'open' statuses).
    return defaultTaskSort(a, b);
  });

  const openCount = DATA.tasks.filter(t => t.status === 'open').length;
  const doneCount = DATA.tasks.filter(t => t.status === 'done').length;
  const cancelledCount = DATA.tasks.filter(t => t.status === 'cancelled').length;

  let html = `
    <div class="flex flex-wrap items-center gap-3 mb-3">
      <div class="flex gap-1">
        ${['all','open','done','cancelled'].map(f =>
          `<button onclick="taskFilter='${f}'; renderTasks();" class="px-2 py-1 rounded text-xs font-medium"
            style="background: ${taskFilter===f ? 'var(--accent)' : 'var(--surface2)'}; color: ${taskFilter===f ? 'var(--bg)' : 'var(--text-dim)'};">${f}</button>`
        ).join('')}
      </div>
      <span class="text-xs" style="color: var(--text-dim);">${openCount} open · ${doneCount} done · ${cancelledCount} cancelled</span>
      <input type="text" id="task-search" placeholder="Search tasks..." class="px-3 py-1 rounded text-sm flex-1 min-w-0" oninput="filterTasks()">
    </div>`;

  const onBoard = buildOnBoard();

  html += `<div class="surface rounded-lg overflow-hidden"><table class="w-full text-sm">
    <thead><tr style="background: var(--surface2);">
      <th class="px-3 py-2 text-left text-xs font-medium cursor-pointer select-none" style="color: var(--text-dim); user-select: none;" onclick="setTaskSort('id')" title="Click to sort by ID">ID ${taskSortArrow('id')}</th>
      <th class="px-3 py-2 text-left text-xs font-medium cursor-pointer select-none" style="color: var(--text-dim); user-select: none;" onclick="setTaskSort('task')" title="Click to sort by Task">Task ${taskSortArrow('task')}</th>
      <th class="px-3 py-2 text-left text-xs font-medium cursor-pointer select-none" style="color: var(--text-dim); user-select: none;" onclick="setTaskSort('status')" title="Click to sort by Status">Status ${taskSortArrow('status')}</th>
      <th class="px-3 py-2 text-left text-xs font-medium cursor-pointer select-none" style="color: var(--text-dim); user-select: none;" onclick="setTaskSort('priority')" title="Click to sort by Priority">Priority ${taskSortArrow('priority')}</th>
      <th class="px-3 py-2 text-left text-xs font-medium cursor-pointer select-none" style="color: var(--text-dim); user-select: none;" onclick="setTaskSort('due')" title="Click to sort by Due">Due ${taskSortArrow('due')}</th>
      <th class="px-3 py-2 text-left text-xs font-medium" style="color: var(--text-dim);">Day</th>
      <th class="px-3 py-2 text-left text-xs font-medium" style="color: var(--text-dim);">Done</th>
    </tr></thead><tbody>`;

  for (const t of tasks) {
    const isOverdue = t.status === 'open' && t.due && t.due < today;
    const rowClass = isOverdue ? 'overdue' : '';
    const statusBadge = `<span class="badge badge-${t.status}">${t.status}</span>`;
    const priBadge = t.priority ? `<span class="badge badge-${t.priority}">${t.priority}</span>` : '';
    const isOnBoard = onBoard.has(`task:${t.id}`) || onBoard.has(`todo:${t.id}`);
    const dayCell = t.status === 'open'
      ? (isOnBoard
          ? `<span class="badge" style="background:var(--accent)22;color:var(--accent);border:1px solid var(--accent)44;">📌 day</span>`
          : `<button onclick="addTaskToBoard('${t.id}')" title="Add to Day board / today's todos"
              class="text-[10px] px-1.5 py-0.5 rounded"
              style="background:var(--surface2);color:var(--accent);border:1px solid var(--border);">📌</button>`)
      : '';

    html += `<tr class="${rowClass} task-row border-t" style="border-color: var(--border);"
      data-task="${(t.task||'').toLowerCase()}" data-id="${(t.id||'').toLowerCase()}">
      <td class="px-3 py-2 font-mono text-xs" style="color: var(--text-dim);">${t.id}</td>
      <td class="px-3 py-2">
        <div class="truncate" style="max-width: 400px;" title="${t.notes || t.task}">${t.task}</div>
      </td>
      <td class="px-3 py-2">${statusBadge}</td>
      <td class="px-3 py-2">${t.status === 'open'
        ? `<select onchange="updateTaskField('${t.id}','priority',this.value)"
            class="text-xs rounded px-1 py-0.5"
            style="background:var(--surface);color:var(--text);border:1px solid var(--border);cursor:pointer;">
            ${['high','medium','low',''].map(p =>
              `<option value="${p}" ${(t.priority||'')=== p ? 'selected' : ''}>${p || '—'}</option>`
            ).join('')}
          </select>`
        : priBadge}</td>
      <td class="px-3 py-2 whitespace-nowrap text-xs">${t.status === 'open'
        ? `<input type="date" value="${t.due || ''}"
            onchange="updateTaskField('${t.id}','due',this.value)"
            class="text-xs rounded px-1 py-0.5"
            style="background:var(--surface);color:var(--text);border:1px solid var(--border);cursor:pointer;">`
        : (t.due || '—')}</td>
      <td class="px-3 py-2">${dayCell}</td>
      <td class="px-3 py-2">${t.status === 'open'
        ? `<button onclick="markTaskDone('${t.id}')" title="Mark done in EV"
            class="text-[10px] px-2 py-0.5 rounded"
            style="background:var(--surface2);color:var(--green);border:1px solid var(--green);">✓ done</button>`
        : `<span class="badge badge-${t.status}">${t.status}</span>`}</td>
    </tr>`;
  }

  html += '</tbody></table></div>';
  container.innerHTML = html;
}

function filterTasks() {
  const q = document.getElementById('task-search').value.toLowerCase().trim();
  document.querySelectorAll('.task-row').forEach(row => {

// ── Timeline ──────────────────────────────────────────────────
function renderTimeline() {
  const container = document.getElementById('view-timeline');
  const today = new Date().toISOString().slice(0, 10);

  let events = [...DATA.timeline_events];

  // Split into future and past
  const future = events.filter(e => e.date >= today).reverse(); // chronological for future
  const past = events.filter(e => e.date < today); // already reverse-chronological

  let html = `<div class="mb-3 flex gap-3 items-center">
    <input type="text" id="timeline-search" placeholder="Search timeline..." class="px-3 py-2 rounded text-sm flex-1" oninput="filterTimeline()">
    <select id="timeline-type-filter" class="px-2 py-2 rounded text-sm" onchange="filterTimeline()">
      <option value="all">All types</option>
      <option value="episode">Episodes</option>
      <option value="created">Created</option>
      <option value="updated">Updated</option>
      <option value="renewal">Renewals</option>
      <option value="due">Due dates</option>
      <option value="follow_up">Follow-ups</option>
    </select>
  </div>`;

  // Upcoming section
  if (future.length > 0) {
    html += `<div class="mb-4"><h3 class="text-sm font-bold mb-2 px-2" style="color: var(--amber);">↑ Upcoming</h3>`;
    html += renderTimelineGroup(future, true);
    html += '</div>';
  }

  // Today marker
  html += '<div class="today-marker mb-4"></div>';

  // Past events grouped by month
  const months = {};
  past.forEach(e => {
    const month = e.date ? e.date.slice(0, 7) : 'unknown';
    if (!months[month]) months[month] = [];
    months[month].push(e);
  });

  const sortedMonths = Object.keys(months).sort().reverse();
  for (const month of sortedMonths) {
    const d = new Date(month + '-01');
    const label = d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
    html += `<div class="mb-4">
      <h3 class="text-sm font-bold mb-2 px-2" style="color: var(--text-dim);">${label}</h3>`;
    html += renderTimelineGroup(months[month], false);
    html += '</div>';
  }

  container.innerHTML = html;
}

function renderTimelineGroup(events, isFuture) {
  let html = '<div class="space-y-1">';
  for (const e of events) {
    const typeBadge = `<span class="badge badge-${e.event_type}">${e.event_type.replace('_', ' ')}</span>`;
    const domainBadge = `<span class="badge" style="background: var(--surface2); color: var(--text-dim);">${e.domain || ''}</span>`;

    html += `<div class="flex items-center gap-3 px-3 py-2 rounded timeline-event surface"
      data-title="${(e.title||'').toLowerCase()}" data-type="${e.event_type}" data-domain="${e.domain||''}">
      <span class="text-xs font-mono flex-shrink-0" style="color: var(--text-dim); width: 80px;">${e.date}</span>
      <span class="flex-1 text-sm truncate">${e.title}</span>
      <span class="flex gap-1 flex-shrink-0">${typeBadge}${domainBadge}</span>
    </div>`;
  }
  html += '</div>';
  return html;
}

function filterTimeline() {
  const q = document.getElementById('timeline-search').value.toLowerCase().trim();
  const typeFilter = document.getElementById('timeline-type-filter').value;

  document.querySelectorAll('.timeline-event').forEach(el => {
    const title = el.dataset.title || '';
    const type = el.dataset.type || '';
    const matchesText = !q || title.includes(q);
    const matchesType = typeFilter === 'all' || type === typeFilter;
    el.style.display = (matchesText && matchesType) ? '' : 'none';
  });
}

// ── Zoom ──────────────────────────────────────────────────────
(function initZoom() {
  const ZOOM_KEY = 'ev-dash-zoom';
  const STEP = 0.1;
  const MIN  = 0.5;
  const MAX  = 2.0;

  function applyZoom(z) {
    document.body.style.zoom = z;
    localStorage.setItem(ZOOM_KEY, z);
  }

  function currentZoom() {
    return parseFloat(document.body.style.zoom) || 1;
  }

  // Restore saved zoom
  const saved = parseFloat(localStorage.getItem(ZOOM_KEY));
  if (saved && saved >= MIN && saved <= MAX) applyZoom(saved);

  document.addEventListener('keydown', function(e) {
    // Alt+= or Alt++ → zoom in
    // Alt+- → zoom out
    // Alt+0 → reset
    if (!e.altKey) return;
    if (e.key === '=' || e.key === '+') {
      e.preventDefault();
      applyZoom(Math.min(MAX, Math.round((currentZoom() + STEP) * 10) / 10));
    } else if (e.key === '-') {
      e.preventDefault();
      applyZoom(Math.max(MIN, Math.round((currentZoom() - STEP) * 10) / 10));
    } else if (e.key === '0') {
      e.preventDefault();
      applyZoom(1);
    }
  });
})();

                box-shadow: 0 25px 50px rgba(0,0,0,0.5);">
      <div style="display: flex; align-items: center; justify-content: space-between; padding: 12px 16px;
                  border-bottom: 1px solid var(--border);">
        <div id="article-modal-title" style="font-size: 14px; font-weight: 600; color: var(--text);"></div>
        <div style="display: flex; gap: 8px;">
          <button id="article-edit-btn" onclick="toggleArticleEdit()" style="font-size: 11px; padding: 4px 10px;
            border-radius: 4px; background: var(--surface); border: 1px solid var(--border); color: var(--accent); cursor: pointer;">Edit</button>
          <button id="article-save-btn" onclick="saveArticle()" style="display:none; font-size: 11px; padding: 4px 10px;
            border-radius: 4px; background: var(--green); border: none; color: #000; cursor: pointer; font-weight: 600;">Save</button>
          <button onclick="closeArticleModal()" style="font-size: 11px; padding: 4px 10px;
            border-radius: 4px; background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); cursor: pointer;">Close</button>
        </div>
      </div>
      <div id="article-modal-body" style="flex: 1; overflow-y: auto; padding: 16px;">
        <pre id="article-view" style="white-space: pre-wrap; word-wrap: break-word; font-family: 'SF Mono', Monaco, monospace;
          font-size: 12px; line-height: 1.6; color: var(--text); margin: 0;"></pre>
        <textarea id="article-edit" style="display:none; width: 100%; height: 100%; min-height: 60vh;
          font-family: 'SF Mono', Monaco, monospace; font-size: 12px; line-height: 1.6;
          background: var(--surface); color: var(--text); border: 1px solid var(--border);
          border-radius: 6px; padding: 12px; resize: none;" spellcheck="false"></textarea>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  modal.addEventListener('click', (e) => { if (e.target === modal) closeArticleModal(); });
})();

let _articleModalPath = null;
let _articleModalEditing = false;

// Delegated click handler for article links
document.addEventListener('click', (e) => {
  const link = e.target.closest('[data-article-path]');
  if (link) {
    e.preventDefault();
    openArticle(link.dataset.articlePath);
  }
});

async function openArticle(relPath) {
  const modal = document.getElementById('article-modal');
  const titleEl = document.getElementById('article-modal-title');
  const viewEl = document.getElementById('article-view');
  const editEl = document.getElementById('article-edit');
  const editBtn = document.getElementById('article-edit-btn');
  const saveBtn = document.getElementById('article-save-btn');

  _articleModalPath = relPath;
  _articleModalEditing = false;
  titleEl.textContent = relPath;
  viewEl.textContent = 'Loading…';
  editEl.style.display = 'none';
  viewEl.style.display = 'block';
  editBtn.textContent = 'Edit';
  editBtn.style.display = '';
  saveBtn.style.display = 'none';
  modal.style.display = 'flex';

  try {
    const url = new URL('/article', window.location.origin);
    url.searchParams.set('path', relPath);
    const resp = await fetch(url.toString());
    const data = await resp.json();
    if (!resp.ok) { viewEl.textContent = `Error: ${data.error}`; return; }
    viewEl.textContent = data.content;
    editEl.value = data.content;
  } catch (err) {
    viewEl.textContent = `Fetch error: ${err.message}`;
  }
}

function closeArticleModal() {
  document.getElementById('article-modal').style.display = 'none';
  _articleModalEditing = false;
}

function toggleArticleEdit() {
  const viewEl = document.getElementById('article-view');
  const editEl = document.getElementById('article-edit');
  const editBtn = document.getElementById('article-edit-btn');
  const saveBtn = document.getElementById('article-save-btn');

  _articleModalEditing = !_articleModalEditing;
  if (_articleModalEditing) {
    editEl.value = viewEl.textContent;
    viewEl.style.display = 'none';
    editEl.style.display = 'block';
    editBtn.textContent = 'View';
    saveBtn.style.display = '';
    editEl.focus();
  } else {
    viewEl.style.display = 'block';
    editEl.style.display = 'none';
    editBtn.textContent = 'Edit';
    saveBtn.style.display = 'none';
  }
}

async function saveArticle() {
  const editEl = document.getElementById('article-edit');
  const content = editEl.value;
  try {
    const resp = await fetch('/article/save', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({path: _articleModalPath, content}),
    });
    const data = await resp.json();
    if (resp.ok) {
      // Update view and switch back
      document.getElementById('article-view').textContent = content;
      toggleArticleEdit();
    } else {
      alert(`Save failed: ${data.error}`);
    }
  } catch (err) {
    alert(`Save error: ${err.message}`);
  }
}

// ── Init ──────────────────────────────────────────────────────
loadData();
</script>
